# Deprecated bindings file. New installations include everything directly.

bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(hiarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, hiarchy-launch-browser
bindd = SUPER SHIFT, E, File manager, exec, uwsm-app -- nautilus --new-window "$(hiarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT ALT, B, Browser (private), exec, hiarchy-launch-browser --private
bindd = SUPER SHIFT, N, Editor, exec, hiarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, hiarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, hiarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, hiarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, Y, YouTube, exec, hiarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, Z, Zalo, exec, hiarchy-launch-or-focus-webapp Zalo "https://chat.zalo.me/"


source = ~/.local/share/hiarchy/default/hypr/bindings/media.conf
source = ~/.local/share/hiarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/hiarchy/default/hypr/bindings/tiling.conf
source = ~/.local/share/hiarchy/default/hypr/bindings/utilities.conf
