# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Hiarchy defaults
source = ~/.local/share/hiarchy/default/hypr/autostart.conf
source = ~/.local/share/hiarchy/default/hypr/bindings.conf
source = ~/.local/share/hiarchy/default/hypr/envs.conf
source = ~/.local/share/hiarchy/default/hypr/looknfeel.conf
source = ~/.local/share/hiarchy/default/hypr/input.conf
source = ~/.local/share/hiarchy/default/hypr/windows.conf
source = ~/.local/share/hiarchy/default/hypr/monitors.conf

source = ~/.config/hiarchy/current/theme/hyprland.conf

